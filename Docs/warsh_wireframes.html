
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); }
  .root { padding: 1rem 0; }
  .group-nav { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .gnav-btn { padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); font-size: 13px; cursor: pointer; background: var(--color-background-primary); color: var(--color-text-secondary); transition: all 0.15s; }
  .gnav-btn.active { background: #1A1A2E; color: #D4AF37; border-color: #1A1A2E; }
  .screens-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1.5rem; }
  .screen-card { cursor: pointer; }
  .screen-card:hover .phone-frame { border-color: #D4AF37; }
  .phone-frame { border: 2px solid var(--color-border-secondary); border-radius: 20px; overflow: hidden; background: #1A1A2E; transition: border-color 0.15s; height: 280px; position: relative; }
  .screen-label { font-size: 12px; color: var(--color-text-secondary); margin-top: 6px; text-align: center; }
  .screen-id { font-size: 11px; color: var(--color-text-tertiary); text-align: center; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal-inner { background: var(--color-background-primary); border-radius: 16px; padding: 1.5rem; max-width: 480px; width: 92%; max-height: 90vh; overflow-y: auto; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .modal-title { font-size: 15px; font-weight: 500; }
  .modal-close { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--color-text-secondary); line-height: 1; }
  .modal-phone { width: 220px; border: 2px solid var(--color-border-secondary); border-radius: 28px; overflow: hidden; margin: 0 auto 1rem; height: 420px; position: relative; }
  .spec-list { font-size: 13px; }
  .spec-item { display: flex; gap: 8px; padding: 5px 0; border-bottom: 0.5px solid var(--color-border-tertiary); color: var(--color-text-secondary); }
  .spec-item:last-child { border-bottom: none; }
  .spec-label { color: var(--color-text-tertiary); min-width: 90px; font-size: 12px; }
  .priority-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; display: inline-block; }
  .p-critical { background: #fef3e2; color: #7a4f00; }
  .p-high { background: #e3f0fb; color: #0c447c; }
  .p-medium { background: #eaf3de; color: #3b6d11; }
  .p-low { background: #f1efe8; color: #5f5e5a; }
  .anim-section { margin-top: 0.75rem; padding-top: 0.75rem; border-top: 0.5px solid var(--color-border-tertiary); }
  .anim-title { font-size: 12px; color: var(--color-text-tertiary); margin-bottom: 4px; }
  .anim-text { font-size: 13px; color: var(--color-text-secondary); }
  svg text { font-family: var(--font-sans); }
  .hidden { display: none; }
</style>

<div class="root">
<h2 class="sr-only">Warsh app wireframes — all 21 screens across 4 groups</h2>

<div class="group-nav">
  <button class="gnav-btn active" onclick="filterGroup('all')">All screens (21)</button>
  <button class="gnav-btn" onclick="filterGroup('A')">A — Onboarding (9)</button>
  <button class="gnav-btn" onclick="filterGroup('B')">B — Core tabs (3)</button>
  <button class="gnav-btn" onclick="filterGroup('C')">C — Lesson flow (7)</button>
  <button class="gnav-btn" onclick="filterGroup('D')">D — Supporting (3)</button>
</div>

<div class="screens-grid" id="grid"></div>
</div>

<div id="modal" class="hidden">
  <div class="modal-overlay" onclick="closeModal(event)">
    <div class="modal-inner" onclick="event.stopPropagation()">
      <div class="modal-header">
        <span class="modal-title" id="m-title"></span>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-phone" id="m-phone"></div>
      <div class="spec-list" id="m-specs"></div>
    </div>
  </div>
</div>

function line(x1,y1,x2,y2,stroke='#3A3A55',sw=1){return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${stroke}" stroke-width="${sw}"/>`}

const priorityMap = {critical:'Critical',high:'High',medium:'Medium',low:'Low'};
const priorityClass = {critical:'p-critical',high:'p-high',medium:'p-medium',low:'p-low'};

function renderGrid(group){
  const filtered = group==='all'?screens:screens.filter(s=>s.group===group);
  const grid = document.getElementById('grid');
  grid.innerHTML = filtered.map(s=>`
    <div class="screen-card" onclick="openModal('${s.id}')">
      <div class="phone-frame">${s.svg()}</div>
      <div class="screen-label">${s.id} — ${s.label}</div>
      <div class="screen-id"><span class="priority-badge ${priorityClass[s.priority]}">${priorityMap[s.priority]}</span></div>
    </div>
  `).join('');
}

function filterGroup(g){
  document.querySelectorAll('.gnav-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  renderGrid(g);
}

function openModal(id){
  const s = screens.find(x=>x.id===id);
  document.getElementById('m-title').textContent = `${s.id} — ${s.label}`;
  document.getElementById('m-phone').innerHTML = s.svg();
  document.getElementById('m-phone').style.background = '#1A1A2E';
  document.getElementById('m-specs').innerHTML = `
    <div class="spec-item"><span class="spec-label">Priority</span><span class="priority-badge ${priorityClass[s.priority]}">${priorityMap[s.priority]}</span></div>
    <div class="spec-item"><span class="spec-label">Status</span>${s.status}</div>
    <div class="spec-item"><span class="spec-label">Effort</span>${s.effort}</div>
    <div class="spec-item"><span class="spec-label">Elements</span>${s.elements}</div>
    <div class="anim-section"><div class="anim-title">Animations</div><div class="anim-text">${s.anims}</div></div>
  `;
  document.getElementById('modal').classList.remove('hidden');
}

function closeModal(e){
  if(!e || e.target===document.querySelector('.modal-overlay')||e===undefined){
    document.getElementById('modal').classList.add('hidden');
  }
}

renderGrid('all');

services:
  postgres:
    image: postgres:16-alpine
    container_name: arabai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: arabai
      POSTGRES_PASSWORD: arabai_dev_password
      POSTGRES_DB: arabai
    ports:
      - "5432:5432"
    volumes:
      - arabai-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arabai -d arabai"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  arabai-postgres-data:

// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = findProperty('android.buildToolsVersion') ?: '36.0.0'
        minSdkVersion = Integer.parseInt(findProperty('android.minSdkVersion') ?: '24')
        compileSdkVersion = Integer.parseInt(findProperty('android.compileSdkVersion') ?: '36')
        targetSdkVersion = Integer.parseInt(findProperty('android.targetSdkVersion') ?: '36')
        kotlinVersion = findProperty('android.kotlinVersion') ?: '2.1.20'

        ndkVersion = findProperty('android.ndkVersion') ?: "27.1.12297006"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath('com.android.tools.build:gradle')
        classpath('com.facebook.react:react-native-gradle-plugin')
        classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
    }
}

apply plugin: "com.facebook.react.rootproject"

allprojects {
    repositories {
        maven {
            // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
            url(new File(['node', '--print', "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim(), '../android'))
        }
        maven {
            // Android JSC is installed from npm
            url(new File(['node', '--print', "require.resolve('jsc-android/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim(), '../dist'))
        }

        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }
    }
}

gradle.projectsEvaluated {
    def sentryUnderscore = findProject(":sentry_react-native")
    def sentryHyphen = findProject(":sentry-react-native")
    if (sentryUnderscore != null && sentryHyphen != null) {
        def sentryGenerateDebugResValues = [
            sentryUnderscore.tasks.matching { it.name == "generateDebugResValues" },
            sentryHyphen.tasks.matching { it.name == "generateDebugResValues" }
        ]
        [sentryUnderscore, sentryHyphen].each { sentryProject ->
            sentryProject.tasks.matching {
                it.name in [
                    "generateDebugResources",
                    "packageDebugResources",
                    "extractDeepLinksDebug",
                    "processDebugManifest",
                    "compileDebugLibraryResources",
                    "parseDebugLocalResources",
                    "generateDebugRFile"
                ]
            }.configureEach {
                dependsOn(sentryGenerateDebugResValues)
            }
            sentryProject.tasks.matching {
                it.name in ["compileDebugLibraryResources", "parseDebugLocalResources", "generateDebugRFile"]
            }.configureEach {
                dependsOn(sentryUnderscore.tasks.matching { it.name == "packageDebugResources" })
                dependsOn(sentryHyphen.tasks.matching { it.name == "packageDebugResources" })
            }
            sentryProject.tasks.matching { it.name == "generateDebugRFile" }.configureEach {
                dependsOn(sentryUnderscore.tasks.matching { it.name == "processDebugManifest" })
                dependsOn(sentryHyphen.tasks.matching { it.name == "processDebugManifest" })
                dependsOn(sentryUnderscore.tasks.matching { it.name == "parseDebugLocalResources" })
                dependsOn(sentryHyphen.tasks.matching { it.name == "parseDebugLocalResources" })
            }
            sentryProject.tasks.matching {
                it.name in ["compileDebugJavaWithJavac", "bundleLibCompileToJarDebug", "bundleLibRuntimeToJarDebug"]
            }.configureEach {
                dependsOn(sentryUnderscore.tasks.matching { it.name == "generateDebugRFile" })
                dependsOn(sentryHyphen.tasks.matching { it.name == "generateDebugRFile" })
            }
        }
    }
}
